name: Auto Merge PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    steps:
      # ⏳ 等 GitHub 计算 mergeable
      - name: Wait for mergeable
        run: sleep 5

      # 🔍 检查 PR 状态
      - name: Check PR
        id: pr
        uses: actions/github-script@v6
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            core.info("Mergeable: " + pr.data.mergeable);
            core.info("Draft: " + pr.data.draft);

            core.setOutput("mergeable", pr.data.mergeable);
            core.setOutput("draft", pr.data.draft);

      # 🚀 自动 merge（仅当 CI 通过）
      - name: Merge PR
        if: steps.pr.outputs.mergeable == 'true' &&
            steps.pr.outputs.draft == 'false'
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: "squash"
            });

      # ❌ 冲突提示
      - name: Comment if conflict
        if: steps.pr.outputs.mergeable != 'true'
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "❌ PR has conflicts, cannot auto-merge."
            });