name: Auto Merge on Approve

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run when a review approves the PR
    if: github.event.review.state == 'approved'

    steps:
      - name: Wait for mergeable
        run: sleep 3

      - name: Check PR status
        id: pr
        uses: actions/github-script@v6
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            core.setOutput("mergeable", pr.data.mergeable);
            core.setOutput("draft", pr.data.draft);

      - name: Squash merge
        if: steps.pr.outputs.mergeable == 'true' && steps.pr.outputs.draft == 'false'
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: "squash"
            });

      - name: Comment if conflict
        if: steps.pr.outputs.mergeable != 'true'
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "❌ PR has conflicts, cannot auto-merge."
            });
