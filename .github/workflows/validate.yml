name: Validate Plugin

on:
  pull_request:
    paths:
      - plugins/**
      - .github/scripts/validate.js

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate changed plugin files
        run: node .github/scripts/validate.js
